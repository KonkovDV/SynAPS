# Enable AVX2/FMA3 auto-vectorization for the host CPU.
# Target: Intel 12th-14th Gen (Raptor Lake) — AVX2+FMA3, NOT AVX-512.
# AVX-512 is hardware-disabled on hybrid P/E core architectures.
# For portable wheels, change to: target-cpu=x86-64-v3
[target.'cfg(target_arch = "x86_64")']
rustflags = ["-C", "target-cpu=native"]

# Prefer self-contained LLD on Windows GNU to avoid MinGW ld.exe failures
# on non-ASCII user profile paths (for example Cyrillic usernames).
[target.x86_64-pc-windows-gnu]
linker = "rust-lld"
rustflags = ["-C", "target-cpu=native", "-C", "link-self-contained=yes"]